<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Wars</title>
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 1000px; height: 700px; }
        canvas { background-color: #1a1a1a; border: 4px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 15, 15, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        h1 { font-size: 3rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .subtitle { color: #aaa; margin-bottom: 30px; letter-spacing: 2px; }
        
        button { background: #222; color: #fff; border: 2px solid #fff; padding: 12px 30px; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { background: #fff; color: #000; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* UI Overlays */
        #select-screen { display: none; flex-direction: column; }
        
        /* Minimap */
        #minimap-container { position: absolute; top: 20px; right: 20px; border: 2px solid #555; border-radius: 5px; background: #1a1a1a; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        #minimap-container h4 { margin: 0 0 5px 0; font-size: 0.8rem; text-align: center; color: #aaa; letter-spacing: 1px; }

        /* Map Selector */
        .map-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; background: rgba(0,0,0,0.5); padding: 10px 40px; border-radius: 10px; border: 1px solid #555;}
        .map-selector h2 { margin: 0; color: #ffcc00; width: 150px; text-align: center; font-size: 1.8rem; text-shadow: 0 0 5px #ffcc00;}
        
        .split-container { display: flex; width: 100%; height: 60%; }
        .player-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.3s; padding: 10px;}
        .player-panel.p1 { border-right: 2px solid #444; }
        .selector-box { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
        .arrow-btn { font-size: 2rem; padding: 5px 15px; border-radius: 5px; }
        .tank-display { text-align: center; height: 260px;}
        .tank-display img { height: 140px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .tank-display h2 { margin: 10px 0 5px 0;}
        .ready-text { color: #00ff00; font-size: 1.5rem; font-weight: bold; display: none; margin-top: 15px;}
        
        /* HUD Top: HP and Score */
        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: none; justify-content: space-between; z-index: 5; pointer-events: none; align-items: flex-start;}
        .hp-box { background: rgba(0,0,0,0.7); border: 2px solid #555; padding: 10px 20px; border-radius: 5px; }
        .hp-bar-bg { width: 250px; height: 15px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .hp-bar-fill { height: 100%; background: #00ff00; width: 100%; transition: width 0.2s, background-color 0.2s; }
        
        .score-board { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 10px 30px; font-size: 1.5rem; font-weight: bold; border-radius: 5px; text-transform: uppercase;}
        .score-p1 { color: #00aaff; } .score-p2 { color: #ff3333; }
        
        /* HUD Bottom: Cooldowns */
        .skills-ui { position: absolute; bottom: 20px; display: flex; gap: 15px; z-index: 5; pointer-events: none; display: none;}
        #p1-skills { left: 20px; } #p2-skills { right: 20px; }
        .skill-icon { width: 50px; height: 50px; border: 2px solid #555; background: #222; position: relative; overflow: hidden; border-radius: 5px; transition: border-color 0.2s, box-shadow 0.2s;}
        .skill-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(255,255,255,0.2); }
        .skill-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; z-index: 2; }
        .ammo-text { position: absolute; top: 2px; right: 4px; color: gold; font-size: 0.9rem; font-weight: bold; z-index: 3; text-shadow: 1px 1px 1px #000; }
        
        #victory-screen { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="main-menu" class="overlay">
            <h1>Tank Wars</h1>
            <p class="subtitle">TACTICAL ARMORED COMBAT</p>
            <button id="btn-start" onclick="initSelectScreen()">Loading Assets...</button>
        </div>

        <div id="select-screen" class="overlay">
            <div id="minimap-container">
                <h4>MINIMAP</h4>
                <canvas id="minimapCanvas" width="200" height="140" style="border: 1px solid #333; background-color: #0f0f0f; box-shadow: none;"></canvas>
            </div>

            <div class="map-selector">
                <button class="arrow-btn" onclick="cycleMap(-1)">&#9664;</button>
                <h2 id="map-name-display">DUSK</h2>
                <button class="arrow-btn" onclick="cycleMap(1)">&#9654;</button>
            </div>
            
            <div class="split-container">
                <div class="player-panel p1" id="p1-panel">
                    <h3 style="color: #00aaff;">PLAYER 1 (WASD + Z, X, C)</h3>
                    <div class="selector-box">
                        <button class="arrow-btn" onclick="cycleTank(1, -1)">&#9664;</button>
                        <div class="tank-display" id="p1-display"></div>
                        <button class="arrow-btn" onclick="cycleTank(1, 1)">&#9654;</button>
                    </div>
                    <button id="btn-p1-ready" onclick="toggleReady(1)">Ready</button>
                    <div id="p1-ready-text" class="ready-text">READY!</div>
                </div>
                
                <div class="player-panel" id="p2-panel">
                    <h3 style="color: #ff3333;">PLAYER 2 (ARROWS + L, ;, ')</h3>
                    <div class="selector-box">
                        <button class="arrow-btn" onclick="cycleTank(2, -1)">&#9664;</button>
                        <div class="tank-display" id="p2-display"></div>
                        <button class="arrow-btn" onclick="cycleTank(2, 1)">&#9654;</button>
                    </div>
                    <button id="btn-p2-ready" onclick="toggleReady(2)">Ready</button>
                    <div id="p2-ready-text" class="ready-text">READY!</div>
                </div>
            </div>
        </div>

        <div id="victory-screen" class="overlay">
            <h1 id="victory-title">PLAYER WINS!</h1>
            <p class="subtitle">MATCH COMPLETE</p>
            <button onclick="location.reload()">Play Again</button>
        </div>

        <div id="hud">
            <div class="hp-box" style="border-color: #00aaff;">
                <b style="color: #00aaff;">PLAYER 1</b>
                <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
            </div>
            
            <div class="score-board">
                <span class="score-p1" id="score-p1">0</span> &nbsp;-&nbsp; <span class="score-p2" id="score-p2">0</span>
                <div style="font-size:0.8rem; color:#aaa; text-align:center; margin-top:5px;">BEST OF 5</div>
            </div>

            <div class="hp-box" style="border-color: #ff3333;">
                <b style="color: #ff3333;">PLAYER 2</b>
                <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <div id="p1-skills" class="skills-ui">
            <div class="skill-icon" id="p1-cd-z"><div class="skill-fill" id="p1-fill-z"></div><div class="skill-text">Z</div></div>
            <div class="skill-icon" id="p1-cd-x"><div class="skill-fill" id="p1-fill-x"></div><div class="skill-text">X</div><div class="ammo-text" id="p1-ammo-x"></div></div>
            <div class="skill-icon" id="p1-cd-c"><div class="skill-fill" id="p1-fill-c"></div><div class="skill-text">C</div></div>
        </div>
        <div id="p2-skills" class="skills-ui">
            <div class="skill-icon" id="p2-cd-z"><div class="skill-fill" id="p2-fill-z"></div><div class="skill-text">L</div></div>
            <div class="skill-icon" id="p2-cd-x"><div class="skill-fill" id="p2-fill-x"></div><div class="skill-text">;</div><div class="ammo-text" id="p2-ammo-x"></div></div>
            <div class="skill-icon" id="p2-cd-c"><div class="skill-fill" id="p2-fill-c"></div><div class="skill-text">'</div></div>
        </div>

        <canvas id="gameCanvas" width="1000" height="700"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let frameCount = 0; 

        // --- ASSET MANAGEMENT ---
        const images = {
            grizzly: new Image(), pyro: new Image(), scorpion: new Image(), dreadnaught: new Image(), seraph: new Image(),
            missile: new Image(), cluster: new Image(), arrow: new Image(), bg1: new Image(), bg2: new Image(), goo: new Image(), lightning: new Image(), static: new Image()
        };
        let loadedCount = 0;
        function onAssetLoad() {
            loadedCount++;
            if (loadedCount === 13) { 
                const btn = document.getElementById('btn-start');
                btn.innerText = "ENTER ARENA"; btn.disabled = false;
            }
        }
        images.grizzly.onload = onAssetLoad; images.grizzly.src = 'GrizzlyTank.png';
        images.pyro.onload = onAssetLoad; images.pyro.src = 'PyroTank.png';
        images.scorpion.onload = onAssetLoad; images.scorpion.src = 'ScorpionTank.png';
        images.dreadnaught.onload = onAssetLoad; images.dreadnaught.src = 'DreadnaughtTank.png';
        images.seraph.onload = onAssetLoad; images.seraph.src = 'SeraphTank.png'; 
        images.missile.onload = onAssetLoad; images.missile.src = 'Missile.png';
        images.cluster.onload = onAssetLoad; images.cluster.src = 'ClusterRocket.png';
        images.arrow.onload = onAssetLoad; images.arrow.src = 'CorrosiveArrow.png';
        images.bg1.onload = onAssetLoad; images.bg1.src = 'BGbattle.png';
        images.bg2.onload = onAssetLoad; images.bg2.src = 'BGbattle2.png';
        images.goo.onload = onAssetLoad; images.goo.src = 'GreenGoo.png';
        images.lightning.onload = onAssetLoad; images.lightning.src = 'Lightning.png';
        images.static.onload = onAssetLoad; images.static.src = 'Static.png';

        // --- GAME CONFIG & DATA ---
        const tanksData = [
            { id: 'grizzly', name: 'GRIZZLY', img: images.grizzly, color: '#b533ff', desc: 'Normal [C | \']: Cannon (10)<br>Skill 1 [X | ;]: Cluster (6)<br>Skill 2 [Z | L]: Heavy Missile (15)' },
            { id: 'pyro', name: 'PYRO', img: images.pyro, color: '#ff4500', desc: 'Normal [C | \']: Ricochet (7)<br>Skill 1 [X | ;]: Swarm (6)<br>Skill 2 [Z | L]: Dash & Flamethrower (+Speed/AoE)' },
            { id: 'scorpion', name: 'SCORPION', img: images.scorpion, color: '#00ff66', desc: 'Normal [C | \']: Toxic Burst (3x3)<br>Skill 1 [X | ;]: Hook Arrow (Pull & Jam)<br>Skill 2 [Z | L]: Poison Leak (DoT)' },
            { id: 'dreadnaught', name: 'DREADNAUGHT', img: images.dreadnaught, color: '#8b5a2b', desc: 'Normal [C | \']: Heavy Shell (14)<br>Skill 1 [X | ;]: Dual MG (0.6/shot)<br>Skill 2 [Z | L]: Field Mine (20 Dmg/Knockback)', maxHp: 150, speedMod: 0.5, scaleMod: 1.2 },
            { id: 'seraph', name: 'SERAPH', img: images.seraph, color: '#00ffff', desc: 'Normal [C | \']: Shock Bullet (5 Dmg, 5th shot AoE)<br>Skill 1 [X | ;]: Spark Missile (Emitter)<br>Skill 2 [Z | L]: Lightning Beam (Hold, requires Energy)', maxHp: 100 }
        ];

        const mapsData = [
            {
                id: 'dusk', name: 'DUSK', bgImg: 'bg1',
                walls: [
                    {x: 350, y: 150, w: 20, h: 150}, {x: 630, y: 150, w: 20, h: 150},
                    {x: 350, y: 400, w: 20, h: 150}, {x: 630, y: 400, w: 20, h: 150},
                    {x: 450, y: 340, w: 100, h: 20}
                ],
                rocks: []
            },
            {
                id: 'plains', name: 'PLAINS', bgImg: 'bg2',
                walls: [
                    {x: 350, y: 50, w: 300, h: 20}, 
                    {x: 350, y: 630, w: 300, h: 20}  
                ],
                rocks: [
                    {x: 250, y: 200, r: 40}, {x: 750, y: 200, r: 40}, 
                    {x: 250, y: 500, r: 40}, {x: 750, y: 500, r: 40}, 
                    {x: 500, y: 350, r: 60} 
                ]
            }
        ];

        let gameState = 'MENU'; 
        let p1Selection = 0, p2Selection = 4; 
        let p1Ready = false, p2Ready = false;
        let selectedMapIndex = 0;
        let currentMap = mapsData[selectedMapIndex];

        let players = [];
        let p1Score = 0; let p2Score = 0;
        
        let projectiles = []; let particles = []; let flashes = []; let hazards = []; let floatingTexts = []; 
        
        const spawnPoints = [
            {x: 100, y: 350}, {x: 900, y: 350}, 
            {x: 150, y: 150}, {x: 850, y: 550}  
        ];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Utility Math Function
        function distToSegment(p, v, w) {
            let l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
            if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        // --- MENU LOGIC ---
        function initSelectScreen() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('select-screen').style.display = 'flex';
            updateDisplays();
            drawMinimap();
        }

        function cycleTank(playerNum, dir) {
            if (playerNum === 1 && !p1Ready) p1Selection = (p1Selection + dir + tanksData.length) % tanksData.length;
            else if (playerNum === 2 && !p2Ready) p2Selection = (p2Selection + dir + tanksData.length) % tanksData.length;
            updateDisplays();
        }

        function cycleMap(dir) {
            selectedMapIndex = (selectedMapIndex + dir + mapsData.length) % mapsData.length;
            currentMap = mapsData[selectedMapIndex];
            document.getElementById('map-name-display').innerText = currentMap.name;
            drawMinimap();
        }
        
        function drawMinimap() {
            const mCanvas = document.getElementById('minimapCanvas');
            if(!mCanvas) return;
            const mCtx = mCanvas.getContext('2d');
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            
            const scaleX = mCanvas.width / canvas.width;
            const scaleY = mCanvas.height / canvas.height;

            mCtx.fillStyle = '#5c3a92';
            currentMap.walls.forEach(w => {
                mCtx.fillRect(w.x * scaleX, w.y * scaleY, w.w * scaleX, w.h * scaleY);
            });

            mCtx.fillStyle = '#4a3c31';
            currentMap.rocks.forEach(r => {
                mCtx.beginPath();
                mCtx.arc(r.x * scaleX, r.y * scaleY, r.r * scaleX, 0, Math.PI * 2);
                mCtx.fill();
            });
        }

        function updateDisplays() {
            const t1 = tanksData[p1Selection];
            document.getElementById('p1-display').innerHTML = `<img src="${t1.img.src}"><h2>${t1.name}</h2><p style="font-size:0.8rem; color:#ccc;">${t1.desc}</p>`;
            const t2 = tanksData[p2Selection];
            document.getElementById('p2-display').innerHTML = `<img src="${t2.img.src}"><h2>${t2.name}</h2><p style="font-size:0.8rem; color:#ccc;">${t2.desc}</p>`;
        }

        function toggleReady(playerNum) {
            if (playerNum === 1) {
                p1Ready = true;
                document.getElementById('btn-p1-ready').style.display = 'none';
                document.getElementById('p1-ready-text').style.display = 'block';
                document.getElementById('p1-panel').style.borderColor = '#00ff00';
            } else {
                p2Ready = true;
                document.getElementById('btn-p2-ready').style.display = 'none';
                document.getElementById('p2-ready-text').style.display = 'block';
                document.getElementById('p2-panel').style.borderColor = '#00ff00';
            }
            if (p1Ready && p2Ready) setTimeout(startGame, 800);
        }

        // --- CORE CLASSES ---
        class Tank {
            constructor(owner, config, x, y, angle, controls) {
                this.owner = owner; this.config = config; 
                this.x = x; this.y = y; this.angle = angle;
                
                this.speed = 2.5 * (config.speedMod || 1); 
                this.rotSpeed = 0.045 * (config.speedMod || 1); 
                this.maxHp = config.maxHp || 100;
                this.hp = this.maxHp; 
                this.radius = 25 * (config.scaleMod || 1); 
                this.scaleMod = config.scaleMod || 1;
                
                this.controls = controls;
                this.isDead = false;
                this.invulnTimer = 0; 
                this.stunTimer = 0;
                this.recoil = 0;
                this.dashState = 0; this.dashTimer = 0;
                
                // Knockback forces & Electric FX
                this.kbX = 0; this.kbY = 0; this.kbTimer = 0;
                this.electrocutedTimer = 0;

                this.maxCooldowns = { 
                    c: config.id === 'dreadnaught' ? 2000 : (config.id === 'seraph' ? 1750 : 1500), 
                    x: config.id === 'scorpion' ? 9000 : 8000, 
                    z: 10000 
                };
                this.cooldowns = { c: 0, x: 0, z: 0 };
                this.poisons = []; this.isSlowed = false;

                this.flameTimer = 0; 
                this.burstsLeft = 0; this.burstTimer = 0;
                this.hookState = 'ready'; this.hookTarget = null;
                this.hookTimer = 0; this.activeArrow = null; 

                this.mgMaxAmmo = config.id === 'dreadnaught' ? 150 : 100;
                this.mgAmmo = this.mgMaxAmmo;
                this.mgReloading = false;

                // Seraph Variables
                this.energy = 0;
                this.zReady = false;
                this.zFiring = false;
                this.zChargeTimer = 0;
                this.cShots = 0;
            }

            addPoison(dps, durationFrames) {
                this.poisons.push({ dps: dps, life: durationFrames });
            }

            update() {
                if (this.isDead) return;

                if (this.invulnTimer > 0) this.invulnTimer--;
                if (this.electrocutedTimer > 0) this.electrocutedTimer--;
                
                // Knockback resolution
                if (this.kbTimer > 0) {
                    this.x += this.kbX;
                    this.y += this.kbY;
                    this.kbX *= 0.85; 
                    this.kbY *= 0.85;
                    this.kbTimer--;
                }

                if (this.stunTimer > 0) {
                    this.stunTimer--;
                    if (this.stunTimer % 8 === 0) {
                        createParticles(this.x + (Math.random()-0.5)*30, this.y + (Math.random()-0.5)*30, 2, '#00ffff', 1.2, 0.4);
                    }
                }

                this.isSlowed = false;
                for (let i = this.poisons.length - 1; i >= 0; i--) {
                    let p = this.poisons[i];
                    this.hp -= p.dps / 60; 
                    p.life--;
                    if (p.life <= 0) this.poisons.splice(i, 1);
                }
                
                hazards.forEach(h => {
                    if (h.owner !== this.owner && Math.hypot(this.x - h.x, this.y - h.y) < this.radius + h.radius) {
                        if (h.type === 'poison_pool') {
                            this.hp -= 0.5 / 60; 
                            this.isSlowed = true; 
                        } else if (h.type === 'seraph_aoe') {
                            this.isSlowed = true;
                            this.electrocutedTimer = Math.max(this.electrocutedTimer, 5);
                            if (h.life % 60 === 0) {
                                this.hp -= 2;
                                this.stunTimer = Math.max(this.stunTimer, 30);
                                floatingTexts.push({x: this.x, y: this.y - 40, text: "SHOCKED!", life: 40, color: '#00ffff'});
                                
                                let ownerTank = players.find(p => p.owner === h.owner);
                                if (ownerTank && ownerTank.config.id === 'seraph' && !ownerTank.zReady) {
                                    ownerTank.energy = Math.min(100, ownerTank.energy + 5);
                                }
                            }
                        }
                    }
                });
                
                if (this.hp <= 0 && !this.isDead) {
                    this.isDead = true; createKaboom(this.x, this.y, 2.0 * this.scaleMod); 
                    handleDeath(this.owner === 1 ? 0 : 1); return; 
                }

                let currentSpeed = this.isSlowed ? this.speed * 0.5 : this.speed;

                // Pyro Dash & Flamethrower Buff 
                if (this.flameTimer > 0) {
                    this.flameTimer--;
                    currentSpeed *= 1.3;
                    const tip = this.getTip();
                    
                    if (this.flameTimer % 2 === 0) {
                        for(let i=0; i<3; i++) {
                            let pAngle = this.angle + (Math.random() - 0.5) * 0.7; 
                            let pSpeed = Math.random() * 6 + 3;
                            particles.push({
                                x: tip.x, y: tip.y, vx: Math.cos(pAngle)*pSpeed, vy: Math.sin(pAngle)*pSpeed,
                                life: Math.random() * 0.3 + 0.2, size: Math.random() * 8 + 4, color: Math.random() > 0.4 ? '#ff4500' : '#ffaa00'
                            });
                        }
                    }

                    players.forEach(enemy => {
                        if (enemy.owner !== this.owner && !enemy.isDead && enemy.invulnTimer <= 0) {
                            let dx = enemy.x - tip.x; let dy = enemy.y - tip.y;
                            if (Math.hypot(dx, dy) < 100) { 
                                let angleToEnemy = Math.atan2(dy, dx);
                                let angleDiff = Math.abs(Math.atan2(Math.sin(angleToEnemy - this.angle), Math.cos(angleToEnemy - this.angle)));
                                if (angleDiff < 0.8) { 
                                    enemy.hp -= 3.5 / 60; 
                                    updateHUD();
                                    if (Math.random() > 0.7) createParticles(enemy.x, enemy.y, 1, '#ff4500', 1, 0.2); 
                                    if (enemy.hp <= 0 && !enemy.isDead) {
                                        enemy.isDead = true; createKaboom(enemy.x, enemy.y, 2.0); handleDeath(enemy.owner === 1 ? 0 : 1);
                                    }
                                }
                            }
                        }
                    });
                }

                // Seraph Energy & Beam Logic
                if (this.config.id === 'seraph') {
                    if (this.energy >= 100 && !this.zReady) {
                        this.energy = 100;
                        this.zReady = true;
                    }

                    if (this.zReady && keys[this.controls.z] && this.stunTimer <= 0 && this.dashState === 0) {
                        this.zChargeTimer++;
                        if (this.zChargeTimer > 0 && this.zChargeTimer < 30) {
                            const tip = this.getTip();
                            createParticles(tip.x + (Math.random()-0.5)*40, tip.y + (Math.random()-0.5)*40, 1, '#00ffff', 1, 0.2);
                        }
                        if (this.zChargeTimer >= 30) {
                            this.zFiring = true;
                            this.energy -= 10 / 60; 
                            if (this.energy <= 0) {
                                this.energy = 0;
                                this.zReady = false;
                                this.zFiring = false;
                                this.zChargeTimer = 0;
                            }
                        }
                    } else {
                        this.zChargeTimer = 0;
                        this.zFiring = false;
                        if (this.energy <= 0) {
                            this.zReady = false;
                        }
                    }

                    if (this.zFiring) {
                        const tip = this.getTip();
                        let endX = tip.x; let endY = tip.y;
                        const maxBeamLength = 800;

                        for (let i = 0; i < maxBeamLength; i += 5) {
                            let testX = tip.x + Math.cos(this.angle) * i;
                            let testY = tip.y + Math.sin(this.angle) * i;

                            let hitWall = false;
                            for (let w of currentMap.walls) {
                                if (testX >= w.x && testX <= w.x + w.w && testY >= w.y && testY <= w.y + w.h) { hitWall = true; break; }
                            }
                            if (hitWall) break;

                            let hitRock = false;
                            for (let r of currentMap.rocks) {
                                if (Math.hypot(testX - r.x, testY - r.y) <= r.r) { hitRock = true; break; }
                            }
                            if (hitRock) break;

                            endX = testX; endY = testY;
                        }

                        // Beam damages enemies
                        players.forEach(enemy => {
                            if (enemy.owner !== this.owner && !enemy.isDead && enemy.invulnTimer <= 0) {
                                let dist = distToSegment({x: enemy.x, y: enemy.y}, tip, {x: endX, y: endY});
                                if (dist < enemy.radius + 15) { 
                                    if (frameCount % 30 === 0) { 
                                        enemy.hp -= 2.0;
                                        enemy.electrocutedTimer = 30; // Apply zap FX directly on hit
                                        createParticles(enemy.x, enemy.y, 3, '#00ffff', 1.5, 0.3);
                                        if (enemy.hp <= 0 && !enemy.isDead) {
                                            enemy.isDead = true; createKaboom(enemy.x, enemy.y, 2.0); handleDeath(enemy.owner === 1 ? 0 : 1);
                                        }
                                    }
                                }
                            }
                        });

                        this.beamStartX = tip.x; this.beamStartY = tip.y;
                        this.beamEndX = endX; this.beamEndY = endY;
                    }
                }

                if (this.hookState === 'pulling') {
                    if (this.hookTarget && !this.hookTarget.isDead && this.hookTimer > 0) {
                        let frontX = this.x + Math.cos(this.angle) * 55 * this.scaleMod;
                        let frontY = this.y + Math.sin(this.angle) * 55 * this.scaleMod;
                        let dx = frontX - this.hookTarget.x; let dy = frontY - this.hookTarget.y;
                        let dist = Math.hypot(dx, dy);
                        
                        if (dist > 20) { 
                            this.hookTarget.x += (dx / dist) * 11; this.hookTarget.y += (dy / dist) * 11;
                            createParticles(this.hookTarget.x, this.hookTarget.y, 1, '#00ff66', 1, 0.3);
                        } else {
                            this.hookState = 'ready'; this.hookTarget.stunTimer = 90; 
                            floatingTexts.push({x: this.hookTarget.x, y: this.hookTarget.y - 45, text: "JAMMED!", life: 75, color: '#00ffff'});
                            this.cooldowns.x = Date.now() + this.maxCooldowns.x; this.hookTarget = null;
                        }
                        this.hookTimer--;
                        if (this.hookTimer <= 0 && this.hookState === 'pulling') {
                            this.hookState = 'ready';
                            if (this.hookTarget) this.hookTarget.stunTimer = 90;
                            this.cooldowns.x = Date.now() + this.maxCooldowns.x; this.hookTarget = null;
                        }
                    } else {
                        this.hookState = 'ready'; this.hookTarget = null;
                    }
                }

                if (this.config.id === 'dreadnaught') {
                    const now = Date.now();
                    if (this.mgReloading && now > this.cooldowns.x) {
                        this.mgReloading = false;
                        this.mgAmmo = this.mgMaxAmmo;
                    }
                    if (!this.mgReloading && keys[this.controls.x] && this.dashState === 0 && this.stunTimer <= 0) {
                        if (now > this.cooldowns.x) this.fireMG(now);
                    }
                }

                if (this.burstsLeft > 0 && this.stunTimer <= 0) {
                    this.burstTimer--;
                    if (this.burstTimer <= 0) {
                        const tip = this.getTip();
                        createMuzzleFlash(tip.x, tip.y, this.angle, 0.5);
                        let spread = (Math.random() - 0.5) * 0.3; 
                        projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle + spread, 14, 3, 3, '#00ff66', 'toxic_bullet', 0));
                        this.burstsLeft--; this.burstTimer = 6; this.recoil = 2;
                    }
                }

                if (this.dashState === 1 && this.stunTimer <= 0) {
                    this.dashTimer--;
                    createParticles(this.x - Math.cos(this.angle)*20, this.y - Math.sin(this.angle)*20, 2, this.config.color, 1, 0.5);
                    if (this.dashTimer <= 0) {
                        this.dashState = 2; this.dashTimer = 15; 
                        createKaboom(this.x - Math.cos(this.angle)*25, this.y - Math.sin(this.angle)*25, 0.5); 
                    }
                    return; 
                }
                
                if (this.dashState === 2 && this.stunTimer <= 0) {
                    currentSpeed = 12; this.dashTimer--;
                    createParticles(this.x, this.y, 1, '#fff', 3, 0.4); 
                    if (this.dashTimer <= 0) {
                        this.dashState = 0;
                        if (this.config.id === 'pyro') this.flameTimer = 180; 
                    }
                }

                if (this.dashState !== 2 && this.hookState !== 'pulling' && this.stunTimer <= 0) { 
                    if (keys[this.controls.left]) this.angle -= this.rotSpeed;
                    if (keys[this.controls.right]) this.angle += this.rotSpeed;

                    if (!this.zFiring) {
                        let throttle = 0;
                        if (keys[this.controls.up]) throttle += 1;
                        if (keys[this.controls.down]) throttle -= 1;

                        if (throttle !== 0) {
                            this.x += Math.cos(this.angle) * throttle * currentSpeed;
                            this.y += Math.sin(this.angle) * throttle * currentSpeed;
                        }
                    }
                } else if (this.dashState === 2) {
                    this.x += Math.cos(this.angle) * currentSpeed; this.y += Math.sin(this.angle) * currentSpeed;
                }

                if (this.recoil > 0.1) {
                    this.x -= Math.cos(this.angle) * this.recoil; this.y -= Math.sin(this.angle) * this.recoil;
                    this.recoil *= 0.8;
                }

                this.checkWallCollisions();

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                if (this.dashState === 0 && this.stunTimer <= 0 && !this.zFiring) {
                    const now = Date.now();
                    
                    if (keys[this.controls.c] && now > this.cooldowns.c && this.burstsLeft === 0) this.fireC(now);
                    
                    if (this.config.id !== 'dreadnaught') {
                        if (keys[this.controls.x]) {
                            if (!this.xHeld) { this.fireX(now); this.xHeld = true; }
                        } else { this.xHeld = false; }
                    }

                    if (this.config.id !== 'seraph') {
                        if (keys[this.controls.z] && now > this.cooldowns.z) this.fireZ(now);
                    }
                }
            }

            checkWallCollisions() {
                for (let w of currentMap.walls) {
                    let testX = this.x; let testY = this.y;
                    if (this.x < w.x) testX = w.x; else if (this.x > w.x + w.w) testX = w.x + w.w;
                    if (this.y < w.y) testY = w.y; else if (this.y > w.y + w.h) testY = w.y + w.h;
                    let distX = this.x - testX; let distY = this.y - testY;
                    let distance = Math.hypot(distX, distY);
                    if (distance < this.radius) {
                        let push = this.radius - distance;
                        let normX = distX / distance; let normY = distY / distance;
                        this.x += normX * push; this.y += normY * push;
                    }
                }
                
                for (let r of currentMap.rocks) {
                    let dx = this.x - r.x;
                    let dy = this.y - r.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < this.radius + r.r) {
                        let push = (this.radius + r.r) - dist;
                        this.x += (dx / dist) * push;
                        this.y += (dy / dist) * push;
                    }
                }
            }

            getTip() {
                const offset = (this.config.img.width * 0.12 * this.scaleMod) / 2;
                return { x: this.x + Math.cos(this.angle)*offset, y: this.y + Math.sin(this.angle)*offset };
            }

            fireC(now) {
                this.cooldowns.c = now + this.maxCooldowns.c; 
                this.recoil = 4;
                const tip = this.getTip();
                
                if (this.config.id === 'scorpion') {
                    this.burstsLeft = 3; this.burstTimer = 0; 
                } else if (this.config.id === 'dreadnaught') {
                    createMuzzleFlash(tip.x, tip.y, this.angle, 2.0);
                    projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle, 11, 8, 14, '#ff4500', 'dread_c', 2));
                } else if (this.config.id === 'seraph') {
                    createMuzzleFlash(tip.x, tip.y, this.angle, 1.5);
                    this.cShots++;
                    let isFifth = (this.cShots % 5 === 0);
                    let p = new Projectile(this.owner, tip.x, tip.y, this.angle, 12, 4, 5, '#00ffff', 'seraph_c', 1);
                    p.isFifth = isFifth;
                    projectiles.push(p);
                } else {
                    createMuzzleFlash(tip.x, tip.y, this.angle);
                    if (this.config.id === 'grizzly') projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle, 12, 4, 10, '#b533ff', 'bullet', 0));
                    else projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle, 12, 4, 7, '#ff4500', 'bullet', 1));
                }
            }

            fireMG(now) {
                this.cooldowns.x = now + 100; 
                const w = this.config.img.width * 0.12 * this.scaleMod;
                const h = this.config.img.height * 0.12 * this.scaleMod;
                
                const fwd = w * 0.25; const side = h * 0.35;
                let px1 = this.x + Math.cos(this.angle)*fwd - Math.sin(this.angle)*side;
                let py1 = this.y + Math.sin(this.angle)*fwd + Math.cos(this.angle)*side;
                let px2 = this.x + Math.cos(this.angle)*fwd - Math.sin(this.angle)*(-side);
                let py2 = this.y + Math.sin(this.angle)*fwd + Math.cos(this.angle)*(-side);

                createMuzzleFlash(px1, py1, this.angle, 0.3); 
                createMuzzleFlash(px2, py2, this.angle, 0.3); 

                let spread1 = (Math.random() - 0.5) * 0.2; let spread2 = (Math.random() - 0.5) * 0.2;

                projectiles.push(new Projectile(this.owner, px1, py1, this.angle + spread1, 18, 2, 0.6, '#ffcc00', 'mg', 0));
                projectiles.push(new Projectile(this.owner, px2, py2, this.angle + spread2, 18, 2, 0.6, '#ffcc00', 'mg', 0));
                
                this.mgAmmo -= 2;
                if (this.mgAmmo <= 0) {
                    this.mgAmmo = 0; this.mgReloading = true;
                    this.maxCooldowns.x = 15000; this.cooldowns.x = now + 15000;
                }
            }

            fireX(now) {
                if (this.config.id === 'scorpion') {
                    if (this.hookState !== 'ready' || now < this.cooldowns.x) return;
                    this.recoil = 6; this.hookState = 'fired';
                    const tip = this.getTip();
                    createMuzzleFlash(tip.x, tip.y, this.angle, 1.5);
                    let arrow = new Projectile(this.owner, tip.x, tip.y, this.angle, 15, 5, 5, '#00ff66', 'arrow', 0);
                    projectiles.push(arrow); this.activeArrow = arrow;
                    return;
                }

                if (now < this.cooldowns.x) return;
                this.cooldowns.x = now + this.maxCooldowns.x;
                this.recoil = 7;
                
                if (this.config.id === 'grizzly') {
                    const tip = this.getTip(); createMuzzleFlash(tip.x, tip.y, this.angle, 2);
                    for (let i = 0; i < 5; i++) {
                        let rAngle = this.angle - 0.4 + (0.8 / 4) * i;
                        projectiles.push(new Projectile(this.owner, tip.x, tip.y, rAngle, 8, 4, 6, '#ff6600', 'rocket', 3));
                    }
                } else if (this.config.id === 'pyro') {
                    const w = this.config.img.width * 0.12; const h = this.config.img.height * 0.12;
                    const pods = [ {x: 0.15, y: -0.38}, {x: -0.20, y: -0.38}, {x: 0.15, y: 0.38}, {x: -0.20, y: 0.38} ];
                    pods.forEach((pod, index) => {
                        const px = this.x + (pod.x * w * Math.cos(this.angle) - pod.y * h * Math.sin(this.angle));
                        const py = this.y + (pod.x * w * Math.sin(this.angle) + pod.y * h * Math.cos(this.angle));
                        createMuzzleFlash(px, py, this.angle, 1);
                        for(let i=0; i<2; i++) {
                            let r = new Projectile(this.owner, px, py, this.angle + (Math.random()-0.5)*0.5, 7 + Math.random()*2, 3, 6, '#ff4500', 'swarm', 0);
                            r.baseAngle = this.angle; r.timer = index * 5; projectiles.push(r);
                        }
                    });
                } else if (this.config.id === 'seraph') {
                    const tip = this.getTip(); createMuzzleFlash(tip.x, tip.y, this.angle, 2);
                    projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle, 10, 6, 3, '#00ffff', 'seraph_x', 1));
                }
            }

            fireZ(now) {
                if (this.config.id === 'dreadnaught') {
                    let activeMines = hazards.filter(h => h.owner === this.owner && h.type === 'mine').length;
                    if (activeMines >= 6) return; 
                    this.cooldowns.z = now + this.maxCooldowns.z;
                    // Dreadnaught mines logic upgraded inside hazards loop
                    hazards.push({ owner: this.owner, type: 'mine', x: this.x, y: this.y, radius: 15, life: 999999, age: 0, visible: true, triggering: false, triggerTimer: 0 });
                    return;
                }

                this.cooldowns.z = now + this.maxCooldowns.z;
                if (this.config.id === 'grizzly') {
                    this.recoil = 12; const tip = this.getTip(); createMuzzleFlash(tip.x, tip.y, this.angle, 3);
                    projectiles.push(new Projectile(this.owner, tip.x, tip.y, this.angle, 9, 8, 15, '#8a2be2', 'missile', 0));
                } else if (this.config.id === 'pyro') {
                    this.dashState = 1; this.dashTimer = 30;
                } else if (this.config.id === 'scorpion') {
                    hazards.push({ owner: this.owner, type: 'poison_pool', x: this.x, y: this.y, radius: 70, life: 1200 });
                    createParticles(this.x, this.y, 20, '#00ff66', 2, 1.5);
                }
            }

            draw() {
                if (this.isDead) return;
                if (this.invulnTimer > 0 && Math.floor(this.invulnTimer / 10) % 2 === 0) return;
                
                if (this.poisons.length > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(0, 255, 102, 0.3)'; ctx.fill();
                }

                // Hit visual FX for Seraph's electricity
                if (this.electrocutedTimer > 0) {
                    ctx.save();
                    for(let i=0; i<3; i++) {
                        if (Math.random() > 0.3) {
                            ctx.beginPath();
                            let sx = this.x + (Math.random()-0.5)*this.radius*2.5;
                            let sy = this.y + (Math.random()-0.5)*this.radius*2.5;
                            let ex = this.x + (Math.random()-0.5)*this.radius*2.5;
                            let ey = this.y + (Math.random()-0.5)*this.radius*2.5;
                            ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
                            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff'; ctx.stroke();
                        }
                    }
                    ctx.restore();
                }
                
                if (this.stunTimer > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI*2);
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 3; ctx.stroke();
                }

                ctx.save(); ctx.translate(this.x, this.y); 
                
                // Seraph HUD Bar
                if (this.config.id === 'seraph') {
                    ctx.save();
                    ctx.fillStyle = '#222';
                    ctx.fillRect(-25, -45, 50, 6);
                    ctx.fillStyle = this.zReady ? '#fff' : '#00ffff';
                    if (this.zReady) { ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff'; } 
                    else { ctx.shadowBlur = 0; }
                    ctx.fillRect(-25, -45, (this.energy / 100) * 50, 6);
                    ctx.restore();
                }

                ctx.rotate(this.angle);
                ctx.shadowBlur = this.dashState === 2 ? 30 : 15;
                ctx.shadowColor = this.stunTimer > 0 ? '#00ffff' : this.config.color;
                const w = this.config.img.width * 0.12 * this.scaleMod; 
                const h = this.config.img.height * 0.12 * this.scaleMod;
                ctx.drawImage(this.config.img, -w / 2, -h / 2, w, h); ctx.restore();
            }
        }

        class Projectile {
            constructor(owner, x, y, angle, speed, radius, damage, color, type, bounces) {
                this.owner = owner; this.x = x; this.y = y; this.angle = angle;
                this.vx = Math.cos(angle)*speed; this.vy = Math.sin(angle)*speed;
                this.speed = speed; this.radius = radius; this.damage = damage; 
                this.color = color; this.type = type; this.bounces = bounces;
                this.life = type === 'missile' ? 70 : (type === 'arrow' ? 45 : 999); 
                this.dead = false;
                this.isFifth = false; 

                // Non-MG bullets have 3 HP to withstand exactly 3 MG bullets
                this.projectileHp = type === 'mg' ? 1 : 3;
            }

            update() {
                if (this.type === 'swarm') {
                    this.timer++;
                    if (this.timer % 6 === 0) this.targetAngle = this.baseAngle + (Math.random() - 0.5) * 1.5;
                    if(this.targetAngle) this.angle += (this.targetAngle - this.angle) * 0.25;
                    this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
                }

                this.lastX = this.x; this.lastY = this.y;
                this.x += this.vx; this.y += this.vy; this.life--;

                if (this.type === 'seraph_c' || this.type === 'seraph_x' || this.type === 'seraph_spark') {
                    createParticles(this.x + (Math.random()-0.5)*15, this.y + (Math.random()-0.5)*15, 1, '#00ffff', 1.5, 0.3);
                    if (Math.random() > 0.5) {
                        createParticles(this.x, this.y, 1, '#fff', 2, 0.2);
                    }
                } else if (this.type === 'toxic_bullet') {
                    createParticles(this.x, this.y, 1, 'rgba(0, 255, 102, 0.5)', 2, 0.2); 
                } else if (this.type === 'dread_c') {
                    createParticles(this.x, this.y, 2, '#ff4500', 3, 0.4);
                } else if (this.type !== 'bullet' && this.type !== 'arrow' && this.type !== 'mg' && Math.random() > 0.2) {
                    createParticles(this.x, this.y, 1, 'rgba(150, 150, 150, 0.7)', 4, 0.4);
                }

                let collided = false;
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; collided = true; } 
                else if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -1; collided = true; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; collided = true; } 
                else if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -1; collided = true; }

                if (!collided) {
                    for (let w of currentMap.walls) {
                        if (this.x + this.radius > w.x && this.x - this.radius < w.x + w.w &&
                            this.y + this.radius > w.y && this.y - this.radius < w.y + w.h) {
                            let hitHoriz = this.lastX + this.radius <= w.x || this.lastX - this.radius >= w.x + w.w;
                            let hitVert = this.lastY + this.radius <= w.y || this.lastY - this.radius >= w.y + w.h;
                            if (hitHoriz) { this.vx *= -1; this.x = this.lastX < w.x ? w.x - this.radius : w.x + w.w + this.radius; }
                            if (hitVert) { this.vy *= -1; this.y = this.lastY < w.y ? w.y - this.radius : w.y + w.h + this.radius; }
                            if (!hitHoriz && !hitVert) { this.vx *= -1; this.vy *= -1; }
                            collided = true; break;
                        }
                    }
                }
                
                if (!collided) {
                    for (let r of currentMap.rocks) {
                        let dx = this.x - r.x; let dy = this.y - r.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist < this.radius + r.r) {
                            let nx = dx / dist; let ny = dy / dist;
                            let dot = this.vx * nx + this.vy * ny;
                            this.vx = this.vx - 2 * dot * nx;
                            this.vy = this.vy - 2 * dot * ny;
                            this.x += nx * ((this.radius + r.r) - dist);
                            this.y += ny * ((this.radius + r.r) - dist);
                            collided = true; break;
                        }
                    }
                }

                if (collided) {
                    if (this.bounces > 0) { this.angle = Math.atan2(this.vy, this.vx); this.bounces--; } 
                    else { this.triggerExplosion(); }
                } else if (this.life <= 0 && !this.dead) { this.triggerExplosion(); }
            }

            triggerExplosion() {
                this.dead = true;
                if (this.type === 'arrow') {
                    let ownerTank = players.find(p => p.owner === this.owner);
                    if (ownerTank && ownerTank.hookState === 'fired') {
                        ownerTank.hookState = 'ready';
                        ownerTank.cooldowns.x = Date.now() + ownerTank.maxCooldowns.x;
                    }
                }

                if (this.type === 'mg' || this.type === 'bullet') {
                    createParticles(this.x, this.y, 4, '#fff', 1, 0.3);
                } else if (this.type === 'toxic_bullet' || this.type === 'arrow') {
                    createParticles(this.x, this.y, 8, '#00ff66', 1.5, 0.5); 
                } else if (this.type === 'seraph_c') {
                    createParticles(this.x, this.y, 8, '#00ffff', 1.5, 0.5);
                    if (this.isFifth) {
                        hazards.push({ owner: this.owner, type: 'seraph_aoe', x: this.x, y: this.y, radius: 140, life: 360 });
                    }
                } else if (this.type === 'seraph_x') {
                    createParticles(this.x, this.y, 15, '#00ffff', 2.0, 0.5);
                    hazards.push({ owner: this.owner, type: 'seraph_emitter', x: this.x, y: this.y, radius: 10, life: 240 });
                } else if (this.type === 'seraph_spark') {
                    createParticles(this.x, this.y, 5, '#00ffff', 1, 0.4);
                } else {
                    createKaboom(this.x, this.y, this.type === 'missile' ? 1.5 : 1.0);
                }
                
                if (this.type === 'missile') {
                    for (let j = 0; j < 5; j++) {
                        let crAngle = this.angle - 0.4 + (0.8 / 4) * j;
                        projectiles.push(new Projectile(this.owner, this.x, this.y, crAngle, 7, 4, 5, '#ff6600', 'rocket', 1));
                    }
                }
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                if (this.type === 'missile') {
                    const w = images.missile.width * 0.15; const h = images.missile.height * 0.15;
                    ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.drawImage(images.missile, -w/2, -h/2, w, h);
                } else if (this.type === 'swarm' || this.type === 'rocket') {
                    const scale = 0.07; const w = images.cluster.width * scale; const h = images.cluster.height * scale;
                    ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.drawImage(images.cluster, -w/2, -h/2, w, h);
                } else if (this.type === 'arrow') {
                    const scale = 0.12; const w = images.arrow.width * scale; const h = images.arrow.height * scale;
                    ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.drawImage(images.arrow, -w/2, -h/2, w, h);
                } else if (this.type === 'dread_c') {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                    ctx.fillStyle = '#ff6600'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff3300'; ctx.fill();
                    ctx.beginPath(); ctx.arc(0, 0, this.radius * 0.6, 0, Math.PI*2);
                    ctx.fillStyle = '#ffeeaa'; ctx.fill();
                } else if (this.type === 'mg') {
                    ctx.beginPath(); ctx.rect(-3, -1, 6, 2); 
                    ctx.fillStyle = this.color; ctx.shadowBlur = 5; ctx.shadowColor = this.color; ctx.fill();
                } else if (this.type === 'seraph_c') {
                    if (images.lightning.complete) {
                        const scale = 0.15;
                        const w = images.lightning.width * scale;
                        const h = images.lightning.height * scale;
                        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; 
                        ctx.drawImage(images.lightning, -w/2, -h/2, w, h);
                    }
                } else if (this.type === 'seraph_spark' || this.type === 'seraph_x') {
                    if (images.static.complete) {
                        const scale = 0.15;
                        const w = images.static.width * scale;
                        const h = images.static.height * scale;
                        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; 
                        ctx.drawImage(images.static, -w/2, -h/2, w, h);
                    }
                } else {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                    ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- ENGINE LOGIC ---
        function startGame() {
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('p1-skills').style.display = 'flex';
            document.getElementById('p2-skills').style.display = 'flex';
            
            p1Score = 0; p2Score = 0; frameCount = 0;
            
            players = [
                new Tank(1, tanksData[p1Selection], spawnPoints[0].x, spawnPoints[0].y, 0, {up:'w', down:'s', left:'a', right:'d', c:'c', x:'x', z:'z'}),
                new Tank(2, tanksData[p2Selection], spawnPoints[3].x, spawnPoints[3].y, Math.PI, {up:'arrowup', down:'arrowdown', left:'arrowleft', right:'arrowright', c:'\'', x:';', z:'l'})
            ];
            
            projectiles = []; particles = []; flashes = []; hazards = []; floatingTexts = [];
            gameState = 'PLAYING';
            updateHUD();
        }

        function handleDeath(loserIndex) {
            let winnerIndex = loserIndex === 0 ? 1 : 0;
            
            if (winnerIndex === 0) p1Score++;
            else p2Score++;
            
            document.getElementById('score-p1').innerText = p1Score;
            document.getElementById('score-p2').innerText = p2Score;
            
            if (p1Score >= 3 || p2Score >= 3) {
                gameState = 'OVER';
                const winnerText = p1Score >= 3 ? "PLAYER 1" : "PLAYER 2";
                document.getElementById('victory-title').innerText = `${winnerText} WINS!`;
                document.getElementById('victory-title').style.color = p1Score >= 3 ? '#00aaff' : '#ff3333';
                setTimeout(() => document.getElementById('victory-screen').style.display = 'flex', 1500);
            } else {
                setTimeout(() => {
                    let loser = players[loserIndex];
                    let winner = players[winnerIndex];
                    
                    let bestSpawn = spawnPoints[0];
                    let maxDist = -1;
                    for(let sp of spawnPoints) {
                        let dist = Math.hypot(sp.x - winner.x, sp.y - winner.y);
                        if (dist > maxDist) { maxDist = dist; bestSpawn = sp; }
                    }
                    
                    loser.x = bestSpawn.x; loser.y = bestSpawn.y;
                    loser.hp = loser.maxHp; loser.isDead = false; loser.poisons = []; loser.stunTimer = 0;
                    loser.hookState = 'ready'; loser.dashState = 0; loser.burstsLeft = 0; loser.flameTimer = 0;
                    loser.mgAmmo = loser.mgMaxAmmo; 
                    loser.mgReloading = false;
                    loser.invulnTimer = 90; 
                    loser.kbX = 0; loser.kbY = 0; loser.kbTimer = 0; loser.electrocutedTimer = 0;
                    
                    loser.energy = 0;
                    loser.zReady = false;
                    loser.zFiring = false;
                    loser.zChargeTimer = 0;
                    loser.cShots = 0;
                    
                    updateHUD();
                }, 1500); 
            }
        }

        function createKaboom(x, y, scale = 1.0) {
            flashes.push({ x, y, radius: 5*scale, maxRadius: 30*scale, life: 1.0 });
            for (let i = 0; i < 25*scale; i++) {
                const isSmoke = Math.random() > 0.5;
                particles.push({
                    x, y, vx: (Math.random()-0.5)*(isSmoke?6:12)*scale, vy: (Math.random()-0.5)*(isSmoke?6:12)*scale,
                    life: 1.0, size: (Math.random()*4 + 2)*scale,
                    color: isSmoke ? '#444' : (Math.random() > 0.5 ? '#ff3300' : '#ffaa00')
                });
            }
        }

        function createParticles(x, y, count, color, sizeMultiplier=1, lifeMultiplier=1) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
                    life: (Math.random()*0.5 + 0.5)*lifeMultiplier, size: (Math.random()*3 + 1)*sizeMultiplier, color
                });
            }
        }

        function createMuzzleFlash(x, y, angle, size=1) {
            for (let i = 0; i < 8*size; i++) {
                const speed = (Math.random() + 0.5) * 5; const pAngle = angle + (Math.random() - 0.5) * 0.5;
                particles.push({
                    x, y, vx: Math.cos(pAngle)*speed, vy: Math.sin(pAngle)*speed,
                    life: Math.random()*0.3 + 0.2, size: Math.random()*3*size + 1, color: 'rgba(200, 200, 200, 0.6)'
                });
            }
        }

        function updateHUD() {
            if (players[0] && !players[0].isDead) {
                const p1Hp = document.getElementById('p1-hp');
                p1Hp.style.width = Math.min(100, Math.max(0, (players[0].hp / players[0].maxHp) * 100)) + '%'; 
                p1Hp.style.background = (players[0].hp / players[0].maxHp) > 0.3 ? '#00ff00' : '#ff0000';
            } else if (players[0]) {
                document.getElementById('p1-hp').style.width = '0%';
            }
            
            if (players[1] && !players[1].isDead) {
                const p2Hp = document.getElementById('p2-hp');
                p2Hp.style.width = Math.min(100, Math.max(0, (players[1].hp / players[1].maxHp) * 100)) + '%'; 
                p2Hp.style.background = (players[1].hp / players[1].maxHp) > 0.3 ? '#00ff00' : '#ff0000';
            } else if (players[1]) {
                document.getElementById('p2-hp').style.width = '0%';
            }
        }

        function updateCooldownUI() {
            const now = Date.now();
            players.forEach((p, index) => {
                const pPrefix = index === 0 ? 'p1' : 'p2';
                const skills = ['c', 'x', 'z'];
                
                let ammoTextEl = document.getElementById(`${pPrefix}-ammo-x`);
                if (ammoTextEl) {
                    if (p.config.id === 'dreadnaught') {
                        ammoTextEl.innerText = p.mgReloading ? '0' : Math.floor(p.mgAmmo);
                        ammoTextEl.style.color = p.mgReloading ? '#ff3333' : 'gold';
                        if (!p.mgReloading) p.maxCooldowns.x = 100;
                    } else {
                        ammoTextEl.innerText = '';
                    }
                }

                skills.forEach(skill => {
                    let percent = 1;
                    
                    if (p.config.id === 'seraph' && skill === 'z') {
                        percent = p.energy / 100;
                    } else if (p.config.id === 'scorpion' && skill === 'x' && (p.hookState === 'pulling' || p.hookState === 'fired')) {
                        percent = 0; 
                    } else if (now < p.cooldowns[skill]) {
                        let elapsed = p.maxCooldowns[skill] - (p.cooldowns[skill] - now);
                        percent = Math.max(0, elapsed / p.maxCooldowns[skill]);
                    }

                    const fillEl = document.getElementById(`${pPrefix}-fill-${skill}`);
                    const iconEl = document.getElementById(`${pPrefix}-cd-${skill}`);
                    
                    if (fillEl && iconEl) {
                        fillEl.style.height = `${percent * 100}%`;
                        if (percent >= 1) {
                            iconEl.style.borderColor = p.config.color;
                            iconEl.style.boxShadow = `0 0 15px ${p.config.color}`;
                            fillEl.style.background = `rgba(${hexToRgb(p.config.color)}, 0.4)`;
                        } else {
                            iconEl.style.borderColor = '#555';
                            iconEl.style.boxShadow = 'none';
                            fillEl.style.background = 'rgba(255,255,255,0.2)';
                        }
                    }
                });
            });
        }
        
        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            frameCount++;
            players.forEach(p => p.update());

            if (players[0] && players[1] && !players[0].isDead && !players[1].isDead) {
                let dx = players[1].x - players[0].x; let dy = players[1].y - players[0].y;
                let dist = Math.hypot(dx, dy);
                let minDist = players[0].radius + players[1].radius;
                
                if (dist < minDist) {
                    let overlap = minDist - dist;
                    let nx = dx / dist; let ny = dy / dist;
                    players[0].x -= nx * (overlap / 2); players[0].y -= ny * (overlap / 2);
                    players[1].x += nx * (overlap / 2); players[1].y += ny * (overlap / 2);
                }
            }

            updateHUD(); updateCooldownUI();

            for (let i = hazards.length - 1; i >= 0; i--) {
                let h = hazards[i];
                
                if (h.type === 'mine') {
                    h.age++;
                    if (h.age > 120 && !h.triggering) h.visible = false;
                    
                    if (h.triggering) {
                        h.triggerTimer--;
                        if (h.triggerTimer % 5 === 0) createParticles(h.x, h.y, 2, '#ff0000', 1.5, 0.2);
                        if (h.triggerTimer <= 0) {
                            players.forEach((tank, tIndex) => {
                                if (tank.owner !== h.owner && !tank.isDead && tank.invulnTimer <= 0) {
                                    let dist = Math.hypot(tank.x - h.x, tank.y - h.y);
                                    if (dist < tank.radius + h.radius + 30) {
                                        tank.hp -= 20;
                                        // Knockback application
                                        let angle = Math.atan2(tank.y - h.y, tank.x - h.x);
                                        tank.kbX = Math.cos(angle) * 15;
                                        tank.kbY = Math.sin(angle) * 15;
                                        tank.kbTimer = 15; // knockback duration 
                                        tank.stunTimer = 75; // 15f knockback + 60f (1s) stun 
                                        floatingTexts.push({x: tank.x, y: tank.y - 40, text: "BLASTED!", life: 60, color: '#ff3333'});
                                        
                                        if (tank.hp <= 0 && !tank.isDead) {
                                            tank.isDead = true;
                                            createKaboom(tank.x, tank.y, 2.0 * tank.scaleMod);
                                            handleDeath(tIndex);
                                        }
                                    }
                                }
                            });
                            createKaboom(h.x, h.y, 2.0);
                            h.life = 0; 
                        }
                    } else {
                        players.forEach(tank => {
                            if (tank.owner !== h.owner && !tank.isDead && tank.invulnTimer <= 0) {
                                if (Math.hypot(tank.x - h.x, tank.y - h.y) < tank.radius + h.radius) {
                                    h.triggering = true;
                                    h.visible = true;
                                    h.triggerTimer = 15; 
                                }
                            }
                        });
                    }
                }
                
                if (h.type === 'seraph_emitter' && h.life % 60 === 0) {
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        projectiles.push(new Projectile(h.owner, h.x, h.y, angle, 6, 3, 1.5, '#00ffff', 'seraph_spark', 1));
                    }
                    createParticles(h.x, h.y, 8, '#00ffff', 1.5, 0.3);
                }
                
                h.life--;
                if (h.life <= 0) hazards.splice(i, 1);
            }

            for (let i = 0; i < projectiles.length; i++) {
                let pA = projectiles[i];
                if (pA.dead) continue;
                
                pA.update();

                players.forEach((tank, tIndex) => {
                    if (pA.owner !== tank.owner && !pA.dead && !tank.isDead && tank.invulnTimer <= 0) {
                        let dist = Math.hypot(pA.x - tank.x, pA.y - tank.y);
                        if (dist < tank.radius + pA.radius) {
                            
                            let startHp = tank.hp;

                            if (pA.type.startsWith('seraph_')) {
                                tank.electrocutedTimer = 30; // Triggers Zap effect explicitly
                            }

                            if (pA.type === 'toxic_bullet') {
                                tank.hp -= pA.damage;
                                tank.addPoison(0.5, 300); 
                            } else if (pA.type === 'arrow') {
                                tank.hp -= pA.damage;
                                tank.addPoison(1.0, 300); 
                                floatingTexts.push({x: tank.x, y: tank.y - 40, text: "HOOKED!", life: 50, color: '#00ff66'});
                                
                                let ownerTank = players.find(p => p.owner === pA.owner);
                                if (ownerTank) {
                                    ownerTank.hookState = 'pulling';
                                    ownerTank.hookTarget = tank;
                                    ownerTank.hookTimer = 60; 
                                }
                            } else if (pA.type === 'seraph_spark') {
                                tank.hp -= pA.damage;
                                if (Math.random() < 0.10) {
                                    tank.stunTimer = Math.max(tank.stunTimer, 30);
                                    floatingTexts.push({x: tank.x, y: tank.y - 40, text: "ZAPPED!", life: 40, color: '#00ffff'});
                                }
                            } else {
                                tank.hp -= pA.damage;
                            }

                            if (tank.hp < startHp) {
                                let ownerTank = players.find(p => p.owner === pA.owner);
                                if (ownerTank && ownerTank.config.id === 'seraph' && !ownerTank.zReady) {
                                    ownerTank.energy = Math.min(100, ownerTank.energy + 5);
                                }
                            }
                            
                            pA.triggerExplosion();
                            
                            if (tank.hp <= 0 && !tank.isDead) {
                                tank.isDead = true;
                                createKaboom(tank.x, tank.y, 2.0 * tank.scaleMod);
                                handleDeath(tIndex);
                            }
                        }
                    }
                });

                // Projectile Intercept Loop (MG bullets collision rule)
                for (let j = i + 1; j < projectiles.length; j++) {
                    let pB = projectiles[j];
                    if (pA.dead || pB.dead) continue;
                    
                    if (pA.owner !== pB.owner) {
                        let pDist = Math.hypot(pA.x - pB.x, pA.y - pB.y);
                        if (pDist < pA.radius + pB.radius + 5) { 
                            if (pA.type === 'mg' && pB.type !== 'mg') {
                                pA.triggerExplosion();
                                pB.projectileHp--;
                                if (pB.projectileHp <= 0) pB.triggerExplosion();
                            } else if (pB.type === 'mg' && pA.type !== 'mg') {
                                pB.triggerExplosion();
                                pA.projectileHp--;
                                if (pA.projectileHp <= 0) pA.triggerExplosion();
                            } else if (pA.type !== 'mg' && pB.type !== 'mg') {
                                pA.triggerExplosion(); 
                                pB.triggerExplosion();
                            }
                        }
                    }
                }
            }
            
            projectiles = projectiles.filter(p => !p.dead);

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; });
            particles = particles.filter(p => p.life > 0);
            
            flashes.forEach(f => { f.radius += 2; f.life -= 0.1; });
            flashes = flashes.filter(f => f.life > 0);

            floatingTexts.forEach(t => { t.y -= 0.5; t.life--; });
            floatingTexts = floatingTexts.filter(t => t.life > 0);
        }

        function draw() {
            if (gameState === 'MENU' || gameState === 'SELECT') return;

            if (images[currentMap.bgImg].complete) {
                ctx.drawImage(images[currentMap.bgImg], 0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            hazards.forEach(h => {
                if (h.type === 'poison_pool' && images.goo.complete) {
                    ctx.save(); ctx.translate(h.x, h.y);
                    ctx.globalAlpha = Math.min(h.life / 60, 0.8);
                    let pulse = 1 + Math.sin(h.life * 0.05) * 0.05;
                    let drawRadius = h.radius * pulse;
                    ctx.drawImage(images.goo, -drawRadius, -drawRadius, drawRadius * 2, drawRadius * 2);
                    ctx.restore();
                } else if (h.type === 'mine') {
                    if (h.visible !== false) {
                        ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2);
                        ctx.fillStyle = '#654321'; ctx.fill(); 
                        ctx.lineWidth = 2; ctx.strokeStyle = '#222'; ctx.stroke();
                        
                        ctx.beginPath(); ctx.arc(h.x, h.y, h.radius * 0.35, 0, Math.PI*2);
                        ctx.fillStyle = h.triggering ? (Math.floor(Date.now() / 50) % 2 === 0 ? '#fff' : '#ff0000') : (Math.floor(Date.now() / 200) % 2 === 0 ? '#ff0000' : '#550000');
                        ctx.fill();
                    }
                } else if (h.type === 'seraph_aoe') {
                    ctx.save(); ctx.translate(h.x, h.y);
                    ctx.globalAlpha = Math.min(h.life / 60, 0.6);
                    ctx.beginPath(); ctx.arc(0, 0, h.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.1)'; ctx.fill();
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.stroke();
                    if (Math.random() > 0.5) {
                        ctx.beginPath();
                        ctx.moveTo((Math.random()-0.5)*h.radius, (Math.random()-0.5)*h.radius);
                        ctx.lineTo((Math.random()-0.5)*h.radius, (Math.random()-0.5)*h.radius);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    }
                    ctx.restore();
                } else if (h.type === 'seraph_emitter') {
                    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2);
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; ctx.fill();
                }
            });

            players.forEach(p => {
                if (p.config.id === 'scorpion' && !p.isDead) {
                    ctx.strokeStyle = '#00ff66'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                    if (p.hookState === 'fired' && p.activeArrow && !p.activeArrow.dead) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.activeArrow.x, p.activeArrow.y); ctx.stroke();
                    } else if (p.hookState === 'pulling' && p.hookTarget && !p.hookTarget.isDead) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.hookTarget.x, p.hookTarget.y); ctx.stroke();
                    }
                    ctx.setLineDash([]); 
                }
            });

            ctx.fillStyle = '#222'; ctx.strokeStyle = '#5c3a92'; ctx.lineWidth = 2;
            currentMap.walls.forEach(w => { 
                ctx.fillRect(w.x, w.y, w.w, w.h); 
                ctx.strokeRect(w.x, w.y, w.w, w.h); 
            });
            
            currentMap.rocks.forEach(r => {
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
                ctx.fillStyle = '#4a3c31'; ctx.fill();
                ctx.strokeStyle = '#2a1c11'; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(r.x - r.r*0.2, r.y - r.r*0.2, r.r*0.4, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
            });

            particles.forEach(p => { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
            flashes.forEach(f => { ctx.globalAlpha = Math.max(0, f.life); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1.0;

            projectiles.forEach(p => p.draw());
            players.forEach(p => p.draw());

            players.forEach(p => {
                if (p.config.id === 'seraph' && p.zFiring && p.beamEndX !== undefined && !p.isDead) {
                    ctx.beginPath(); ctx.moveTo(p.beamStartX, p.beamStartY); ctx.lineTo(p.beamEndX, p.beamEndY);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 10 + Math.random() * 5;
                    ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff'; ctx.stroke();

                    ctx.beginPath(); ctx.moveTo(p.beamStartX, p.beamStartY); ctx.lineTo(p.beamEndX, p.beamEndY);
                    ctx.strokeStyle = '#e0ffff'; ctx.lineWidth = 4; ctx.shadowBlur = 0; ctx.stroke();
                }
            });

            ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
            floatingTexts.forEach(t => {
                ctx.fillStyle = t.color || '#fff'; ctx.globalAlpha = Math.max(0, t.life / 60);
                ctx.fillText(t.text, t.x, t.y);
            });
            ctx.globalAlpha = 1.0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
