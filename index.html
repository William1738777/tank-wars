<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Wars</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container">
        <div id="main-menu" class="overlay">
            <h1>Tank Wars</h1>
            <p class="subtitle">TACTICAL ARMORED COMBAT</p>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <button id="btn-start" onclick="showMenu('sp-menu')" disabled>Loading Assets...</button>
                <button id="btn-mp" onclick="startMode('2P')" style="display: none;">2 Players (Local)</button>
                <button id="btn-online" disabled title="Server offline" style="display: none; background: #333; color: #777; border-color: #555;">Online Multiplayer (WIP)</button>
            </div>
        </div>

        <div id="sp-menu" class="overlay" style="display: none;">
            <h1>Single Player</h1>
            <p class="subtitle">SELECT CAMPAIGN</p>
            <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <button disabled style="background: #333; color: #777; border-color: #555;">Story Mode (Locked)</button>
                <button onclick="startMode('ARCADE')">Arcade Mode</button>
                <button onclick="startMode('RAID')">Raid Mode</button>
                <button onclick="showMenu('main-menu')">Back</button>
            </div>
        </div>

        <div id="select-screen" class="overlay">
            <div id="minimap-container">
                <h4>MINIMAP</h4>
                <canvas id="minimapCanvas" width="200" height="140" style="border: 1px solid #333; background-color: #0f0f0f; box-shadow: none;"></canvas>
            </div>

            <div class="map-selector" id="map-selector-ui">
                <button class="arrow-btn" onclick="cycleMap(-1)">&#9664;</button>
                <h2 id="map-name-display">DUSK</h2>
                <button class="arrow-btn" onclick="cycleMap(1)">&#9654;</button>
            </div>
            
            <div class="split-container">
                <div class="player-panel p1" id="p1-panel">
                    <h3 style="color: #00aaff;">PLAYER 1 (WASD + Z, X, C)</h3>
                    <div class="selector-box">
                        <button class="arrow-btn" onclick="cycleTank(1, -1)">&#9664;</button>
                        <div class="tank-display" id="p1-display"></div>
                        <button class="arrow-btn" onclick="cycleTank(1, 1)">&#9654;</button>
                    </div>
                    <button id="btn-p1-ready" onclick="toggleReady(1)">Ready</button>
                    <div id="p1-ready-text" class="ready-text">READY!</div>
                </div>
                
                <div class="player-panel" id="p2-panel">
                    <h3 id="p2-title" style="color: #ff3333;">PLAYER 2 (ARROWS + L, ;, ')</h3>
                    <div class="selector-box">
                        <button class="arrow-btn" id="p2-arrow-left" onclick="cycleTank(2, -1)">&#9664;</button>
                        <div class="tank-display" id="p2-display"></div>
                        <button class="arrow-btn" id="p2-arrow-right" onclick="cycleTank(2, 1)">&#9654;</button>
                    </div>
                    <button id="btn-p2-ready" onclick="toggleReady(2)">Ready</button>
                    <div id="p2-ready-text" class="ready-text">READY!</div>
                </div>
            </div>
        </div>

        <div id="victory-screen" class="overlay">
            <h1 id="victory-title">PLAYER WINS!</h1>
            <p class="subtitle">MATCH COMPLETE</p>
            
            <div id="victory-stats" style="display: flex; gap: 40px; margin: 20px 0; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; border: 1px solid #555;">
                <div style="text-align: left; color: #00aaff;" id="p1-stats-container">
                    <h3>PLAYER 1 STATS</h3>
                    <div id="stats-p1" style="font-size: 1.1rem; line-height: 1.5; color: #ccc;"></div>
                </div>
                <div style="text-align: left; color: #ff3333;" id="p2-stats-container">
                    <h3>PLAYER 2 STATS</h3>
                    <div id="stats-p2" style="font-size: 1.1rem; line-height: 1.5; color: #ccc;"></div>
                </div>
            </div>

            <button onclick="location.reload()">Play Again</button>
        </div>

        <div id="hud">
            <div class="hp-box" style="border-color: #00aaff;" id="hud-p1-box">
                <b style="color: #00aaff;">PLAYER 1</b>
                <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
            </div>
            
            <div class="score-board" id="hud-score">
                <span class="score-p1" id="score-p1">0</span> &nbsp;-&nbsp; <span class="score-p2" id="score-p2">0</span>
                <div style="font-size:0.8rem; color:#aaa; text-align:center; margin-top:5px;" id="best-of-text">BEST OF 5</div>
            </div>

            <div class="hp-box" style="border-color: #ff3333;" id="hud-p2-box">
                <b id="hud-p2-name" style="color: #ff3333;">PLAYER 2</b>
                <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <div id="p1-skills" class="skills-ui">
            <div class="skill-icon" id="p1-cd-z"><div class="skill-fill" id="p1-fill-z"></div><div class="skill-text">Z</div></div>
            <div class="skill-icon" id="p1-cd-x"><div class="skill-fill" id="p1-fill-x"></div><div class="skill-text">X</div><div class="ammo-text" id="p1-ammo-x"></div></div>
            <div class="skill-icon" id="p1-cd-c"><div class="skill-fill" id="p1-fill-c"></div><div class="skill-text">C</div><div class="ammo-text" id="p1-ammo-c"></div></div>
        </div>
        <div id="p2-skills" class="skills-ui">
            <div class="skill-icon" id="p2-cd-z"><div class="skill-fill" id="p2-fill-z"></div><div class="skill-text">L</div></div>
            <div class="skill-icon" id="p2-cd-x"><div class="skill-fill" id="p2-fill-x"></div><div class="skill-text">;</div><div class="ammo-text" id="p2-ammo-x"></div></div>
            <div class="skill-icon" id="p2-cd-c"><div class="skill-fill" id="p2-fill-c"></div><div class="skill-text">'</div><div class="ammo-text" id="p2-ammo-c"></div></div>
        </div>

        <canvas id="gameCanvas" width="1000" height="700"></canvas>
    </div>

    <script src="js/config.js"></script>
    <script src="js/classes/Projectile.js"></script>
    <script src="js/classes/Tank.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/raid.js"></script> <script src="js/engine.js"></script>
</body>
</html>
